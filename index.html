<!DOCTYPE html>
<html>
<head>
    <title>Thursday</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Arial Black', sans-serif; 
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.2s;
            text-align: center;
        }
        
        /* Updated Styles */
        #footer-container { 
            margin-top: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
        }
        #shane-text { font-size: 3rem; font-weight: 900; margin-bottom: 5px; }
        #logo img { width: 120px; border-radius: 50%; border: 2px solid #555; }
        #counter { font-size: 0.8rem; color: #666; }

        #timer { font-size: clamp(2rem, 15vw, 8rem); transition: all 0.5s; }
        #message { font-size: 4rem; text-transform: uppercase; margin-bottom: 20px; }
        
        #audioToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
        }

        #keno { 
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .ball {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 20px 20px, #ffffff, #999);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 20pt;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.6);
            border: 2px solid #666;
            position: relative;
            overflow: hidden;
            animation: vibrate 0.2s infinite;
        }

        .ball::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 60%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes vibrate {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0,0); }
        }

        @keyframes pulse {
            0% { background-color: #000; }
            50% { background-color: #600; }
            100% { background-color: #000; }
        }
        .warning-mode { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <button id="audioToggle">🔇</button>
    <audio id="bgMusic" src="party-theme.mp3" loop></audio>

    <div id="timer">Loading...</div>
    <div id="message"></div>
    <div id="keno"></div>

    <div id="footer-container">
        <div id="shane-text">SHANE IS GHEY</div>
        <a href="https://Tallpinelounge.com" id="logo"><img src="chip2.png" alt="Tall Pine Logo"></a>
        <div id="counter">Hits: <span id="hitCount">0</span></div>
    </div>

    <script>
        let hits = localStorage.getItem('page_hits') || 0;
        hits++;
        localStorage.setItem('page_hits', hits);
        document.getElementById('hitCount').innerText = hits;

        let confettiInterval;
        let testMode = false;
        const audio = document.getElementById('bgMusic');
        const audioBtn = document.getElementById('audioToggle');

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') {
                testMode = !testMode;
                if (!testMode) location.reload();
            }
        });

        audioBtn.addEventListener('click', () => {
            if (audio.muted) {
                audio.muted = false;
                audioBtn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                audioBtn.innerHTML = "🔇";
                audio.pause();
            }
        });

        audio.muted = true;

        function getKenoNumbers(seedDate) {
            const dateString = seedDate.getFullYear() + "-" + seedDate.getMonth() + "-" + seedDate.getDate();
            let seed = 0;
            for (let i = 0; i < dateString.length; i++) {
                seed += dateString.charCodeAt(i);
            }
            let currentSeed = seed;
            const numbers = [];
            while (numbers.length < 6) { 
                currentSeed = (currentSeed * 9301 + 49297) % 233280;
                const num = Math.floor((currentSeed / 233280) * 80) + 1;
                if (!numbers.includes(num)) numbers.push(num);
            }
            return numbers.sort((a, b) => a - b);
        }

            const now = new Date();
            let target = new Date();
            target.setDate(now.getDate() + (4 - now.getDay() + 7) % 7);
            target.setHours(19, 30, 0, 0);
